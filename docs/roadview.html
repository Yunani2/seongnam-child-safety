<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#1a1a1a; }
  #pano { width:100%; height:100vh; }
  #msg {
    display:none; position:absolute; inset:0;
    align-items:center; justify-content:center;
    color:#fff; font-family:'Malgun Gothic',sans-serif; font-size:14px;
    flex-direction:column; gap:12px; background:#222;
    text-align:center; padding:20px; z-index:10;
  }
  .ctrl-btn {
    position:fixed; top:10px; right:10px; z-index:999;
    background:rgba(0,0,0,0.6); color:#fff; border:none;
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-size:13px; font-family:sans-serif;
  }
</style>
</head>
<body>
<div id="pano"></div>
<div id="msg"></div>
<button class="ctrl-btn" id="fs-btn" onclick="toggleFS()">⛶ 전체화면</button>

<script>
  var params  = new URLSearchParams(window.location.search);
  var lat     = parseFloat(params.get('lat') || '37.4201');
  var lng     = parseFloat(params.get('lng') || '127.1265');
  var key     = params.get('key') || '';

  function showMsg(html) {
    var el = document.getElementById('msg');
    el.innerHTML = html;
    el.style.display = 'flex';
  }

  function initPanorama() {
    try {
      new naver.maps.Panorama('pano', {
        position: new naver.maps.LatLng(lat, lng),
        pov: { pan: 0, tilt: 0, fov: 100 }
      });
    } catch(e) {
      showMsg('⚠️ 로드뷰 로딩 실패<br><small>' + e.message + '</small>');
    }
  }

  function waitAndInit(retries) {
    if (typeof naver !== 'undefined' && naver.maps && typeof naver.maps.Panorama === 'function') {
      initPanorama();
    } else if (retries > 0) {
      setTimeout(function(){ waitAndInit(retries - 1); }, 300);
    } else {
      showMsg('⚠️ 네이버 지도 초기화 실패<br><small>API 키 또는 도메인 설정을 확인하세요</small>');
    }
  }

  if (!key) {
    showMsg('⚠️ API 키 없음');
  } else {
    var s = document.createElement('script');
    s.src = 'https://openapi.map.naver.com/openapi/v3/maps.js'
           + '?ncpKeyId=' + encodeURIComponent(key)
           + '&submodules=panorama';
    s.onload  = function() { waitAndInit(20); };
    s.onerror = function() {
      showMsg('⚠️ API 스크립트 로드 실패<br><small>NCP 콘솔 서비스 URL에<br>'
            + window.location.origin + ' 추가 필요</small>');
    };
    document.head.appendChild(s);
  }

  function toggleFS() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
      document.getElementById('fs-btn').textContent = '⛶ 전체화면';
    } else {
      document.documentElement.requestFullscreen();
      document.getElementById('fs-btn').textContent = '✕ 닫기';
    }
  }
</script>
</body></html>
