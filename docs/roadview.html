<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#1a1a1a; }
  #pano { width:100%; height:100vh; }
  #overlay {
    display:none; position:fixed; inset:0; z-index:20;
    align-items:center; justify-content:center;
    flex-direction:column; gap:14px;
    background:rgba(30,30,30,0.92);
    color:#fff; font-family:'Malgun Gothic',sans-serif;
    font-size:13px; text-align:center; padding:20px;
  }
  #overlay a {
    color:#60a5fa; background:rgba(96,165,250,0.15);
    padding:8px 20px; border-radius:8px; text-decoration:none;
    font-weight:600; border:1px solid rgba(96,165,250,0.4);
  }
  .ctrl-btn {
    position:fixed; top:10px; right:10px; z-index:999;
    background:rgba(0,0,0,0.6); color:#fff; border:none;
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-size:13px; font-family:sans-serif;
  }
</style>
</head>
<body>
<div id="pano"></div>
<div id="overlay"></div>
<button class="ctrl-btn" id="fs-btn" onclick="toggleFS()">⛶ 전체화면</button>

<script>
  var params = new URLSearchParams(window.location.search);
  var lat    = parseFloat(params.get('lat') || '37.4201');
  var lng    = parseFloat(params.get('lng') || '127.1265');
  var key    = params.get('key') || '';
  var naverUrl = 'https://map.naver.com/v5/?c=' + lng + ',' + lat + ',17,0,0,0,dh';

  function showOverlay(html) {
    var el = document.getElementById('overlay');
    el.innerHTML = html + '<a href="' + naverUrl + '" target="_blank">🗺️ 네이버 지도에서 보기</a>';
    el.style.display = 'flex';
  }

  function tryPanorama() {
    try {
      new naver.maps.Panorama('pano', {
        position: new naver.maps.LatLng(lat, lng),
        pov: { pan: 0, tilt: 0, fov: 100 }
      });
    } catch(e) {
      // 파노라마 실패 → 일반 지도로 폴백
      tryMap('로드뷰 데이터 없음: ' + e.message);
    }
  }

  function tryMap(reason) {
    try {
      document.getElementById('pano').innerHTML = '';
      new naver.maps.Map('pano', {
        center: new naver.maps.LatLng(lat, lng),
        zoom: 17,
        mapTypeId: naver.maps.MapTypeId.HYBRID
      });
      showOverlay('📍 로드뷰 데이터 없음<br><small style="color:#aaa">' + reason + '</small><br>위성지도로 대체 표시<br>');
    } catch(e2) {
      showOverlay('⚠️ 지도 로드 실패<br><small style="color:#aaa">' + e2.message + '</small><br>');
    }
  }

  function waitAndInit(retries) {
    if (typeof naver !== 'undefined' && naver.maps && naver.maps.LatLng) {
      if (typeof naver.maps.Panorama === 'function') {
        tryPanorama();
      } else {
        tryMap('Panorama 모듈 없음');
      }
    } else if (retries > 0) {
      setTimeout(function(){ waitAndInit(retries - 1); }, 300);
    } else {
      showOverlay('⚠️ 지도 초기화 실패<br><small style="color:#aaa">API 키 또는 도메인 설정 확인 필요</small><br>');
    }
  }

  if (!key) {
    showOverlay('⚠️ API 키가 없습니다<br>');
  } else {
    var s = document.createElement('script');
    s.src = 'https://openapi.map.naver.com/openapi/v3/maps.js'
           + '?ncpKeyId=' + encodeURIComponent(key)
           + '&submodules=panorama';
    s.onload  = function() { waitAndInit(20); };
    s.onerror = function() {
      showOverlay('⚠️ API 스크립트 로드 실패<br><small style="color:#aaa">'
                + 'NCP 콘솔 서비스 URL에<br>https://yunani2.github.io 추가 필요</small><br>');
    };
    document.head.appendChild(s);
  }

  function toggleFS() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
      document.getElementById('fs-btn').textContent = '⛶ 전체화면';
    } else {
      document.documentElement.requestFullscreen();
      document.getElementById('fs-btn').textContent = '✕ 닫기';
    }
  }
</script>
</body></html>
