<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
  // URL 파라미터를 head에서 바로 읽어 Naver Maps 스크립트를 동기 삽입
  var _p   = new URLSearchParams(location.search);
  var _key = _p.get('key') || '';
  var _lat = parseFloat(_p.get('lat') || '37.4201');
  var _lng = parseFloat(_p.get('lng') || '127.1265');
  if (_key) {
    document.write(
      '<scr' + 'ipt src="https://openapi.map.naver.com/openapi/v3/maps.js'
      + '?ncpKeyId=' + encodeURIComponent(_key)
      + '&submodules=panorama"><\/scr' + 'ipt>'
    );
  }
</script>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#111; }
  #pano { width:100%; height:100vh; }
  #overlay {
    display:none; position:fixed; inset:0; z-index:20;
    align-items:center; justify-content:center; flex-direction:column; gap:14px;
    background:rgba(20,20,20,0.93); color:#fff;
    font-family:'Malgun Gothic',sans-serif; font-size:13px;
    text-align:center; padding:24px;
  }
  #overlay a {
    color:#60a5fa; background:rgba(96,165,250,0.12);
    padding:9px 22px; border-radius:8px; text-decoration:none;
    font-weight:600; border:1px solid rgba(96,165,250,0.4);
  }
  .ctrl-btn {
    position:fixed; top:10px; right:10px; z-index:999;
    background:rgba(0,0,0,0.6); color:#fff; border:none;
    border-radius:8px; padding:7px 14px; cursor:pointer;
    font-size:13px; font-family:sans-serif;
  }
</style>
</head>
<body>
<div id="pano"></div>
<div id="overlay"></div>
<button class="ctrl-btn" id="fs-btn" onclick="toggleFS()">⛶ 전체화면</button>

<script>
  var naverUrl = 'https://map.naver.com/v5/?c=' + _lng + ',' + _lat + ',17,0,0,0,dh';

  function showOverlay(msg) {
    var el = document.getElementById('overlay');
    el.innerHTML = msg + '<a href="' + naverUrl + '" target="_blank">🗺️ 네이버 지도에서 보기</a>';
    el.style.display = 'flex';
  }

  window.addEventListener('load', function () {
    if (!_key) { showOverlay('⚠️ API 키 없음<br>'); return; }
    if (typeof naver === 'undefined' || !naver.maps) {
      showOverlay('⚠️ 지도 API 로드 실패<br><small style="color:#aaa">NCP 콘솔 서비스 URL에<br>https://yunani2.github.io 추가 필요</small><br>');
      return;
    }

    // 파노라마 시도
    if (typeof naver.maps.Panorama === 'function') {
      try {
        new naver.maps.Panorama('pano', {
          position: new naver.maps.LatLng(_lat, _lng),
          pov: { pan: 0, tilt: 0, fov: 100 }
        });
        return;
      } catch (e) { /* 아래 폴백으로 */ }
    }

    // 폴백: 위성+하이브리드 지도
    try {
      new naver.maps.Map('pano', {
        center: new naver.maps.LatLng(_lat, _lng),
        zoom: 17,
        mapTypeId: naver.maps.MapTypeId.HYBRID
      });
      showOverlay('📍 이 위치는 로드뷰 데이터가 없습니다<br><small style="color:#aaa">위성지도로 대체 표시</small><br>');
    } catch (e2) {
      showOverlay('⚠️ 지도 표시 실패<br><small style="color:#aaa">' + e2.message + '</small><br>');
    }
  });

  function toggleFS() {
    if (document.fullscreenElement) {
      document.exitFullscreen();
      document.getElementById('fs-btn').textContent = '⛶ 전체화면';
    } else {
      document.documentElement.requestFullscreen();
      document.getElementById('fs-btn').textContent = '✕ 닫기';
    }
  }
</script>
</body></html>
